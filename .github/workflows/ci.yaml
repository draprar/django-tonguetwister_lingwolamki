name: Django CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies (skip pywin32)
        run: |
          python -m pip install --upgrade pip
          grep -a -v 'pywin32' requirements.txt | pip install -r /dev/stdin

      - name: Show installed packages
        run: pip list

      - name: Set test environment variables (SQLite instead of Neon)
        run: |
          cat > .env << 'EOF'
          DEBUG=1
          SECRET_KEY=test-secret-key-for-testing-only
          DATABASE_URL=sqlite:///testdb.sqlite3
          REDIS_URL=
          SENTRY_DSN=
          EMAIL_HOST=localhost
          EMAIL_PORT=1025
          EMAIL_USE_TLS=True
          EMAIL_HOST_USER=test@example.com
          EMAIL_HOST_PASSWORD=testpass
          DEFAULT_FROM_EMAIL=test@example.com
          CONNECTIONS={}
          CONNECTION_STRING=
          EOF

      - name: Run migrations
        run: |
          python manage.py migrate --noinput

      - name: Collect static
        run: python manage.py collectstatic --noinput

      - name: Run tests with pytest
        run: |
          mkdir -p ./test-reports
          pytest --disable-warnings -v

      - name: Store test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pytest-results
          path: ./test-reports

